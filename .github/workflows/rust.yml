name: Release mrar (Windows)

on:
  push:
    tags:
      - "v*.*.*"   # e.g. v0.1.0

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release --locked

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir dist
          cp target/release/mrar.exe dist/mrar-windows-x86_64.exe

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: dist/mrar-windows-x86_64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
